name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve commit
        id: meta
        shell: bash
        run: echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        shell: bash
        run: |
          outdir="dist/slop-cop_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p "$outdir"
          go build -trimpath \
            -ldflags "-s -w \
              -X main.version=latest \
              -X main.commit=${{ steps.meta.outputs.commit }}" \
            -o "$outdir/slop-cop${{ matrix.ext }}" \
            ./cmd/slop-cop
          cp LICENSE NOTICE README.md "$outdir/"

      - name: Package
        shell: bash
        run: |
          cd dist
          base="slop-cop_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -9 -r "${base}.zip" "${base}"
          else
            tar -czf "${base}.tar.gz" "${base}"
          fi
          sha256sum "${base}".* > "${base}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: slop-cop_${{ matrix.goos }}_${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish rolling `latest`
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Aggregate checksums
        shell: bash
        run: |
          cd dist
          ls -la
          cat *.sha256 > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish `latest` release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: latest
          body: |
            Rolling release built from the current tip of `main` (commit `${{ github.sha }}`).
            Assets are replaced in place on every push; URLs are stable.
          prerelease: true
          make_latest: false
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
